<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ECHO // ANONYMOUS CHAT 2026</title>
    <!-- High-end Sans-Serif Font: Inter + Geist fallback -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Socket.io Client -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Geist', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #020105);
            min-height: 100vh;
            color: #eef5ff;
            overflow: hidden;
            position: relative;
        }

        /* Cyberpunk grid overlay (subtle) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Main app container */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(2px);
        }

        /* SIDEBAR (Desktop only) - Glassmorphism with deep blur */
        .sidebar {
            width: 280px;
            background: rgba(8, 6, 18, 0.55);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(0, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            transition: all 0.3s ease;
            z-index: 10;
            box-shadow: 8px 0 32px rgba(0, 0, 0, 0.3);
        }

        .sidebar-header {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header .neon-dot {
            width: 10px;
            height: 10px;
            background: #0f0;
            border-radius: 50%;
            box-shadow: 0 0 8px #0f0;
            animation: pulse-green 1.8s infinite;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }

        .user-item {
            background: rgba(15, 12, 30, 0.6);
            backdrop-filter: blur(5px);
            padding: 0.6rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            border-left: 3px solid #0ff;
            transition: 0.2s;
            word-break: break-word;
            letter-spacing: 0.2px;
            color: #ccf4ff;
        }

        .user-item span {
            font-family: monospace;
            font-size: 0.75rem;
            color: #0ff;
            text-shadow: 0 0 4px #0ff;
        }

        /* Chat Main Area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(2, 1, 10, 0.35);
            backdrop-filter: blur(4px);
            position: relative;
        }

        /* Header */
        .chat-header {
            padding: 1rem 1.8rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .callsign-badge {
            background: rgba(0, 255, 255, 0.1);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.2);
        }

        .online-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .pulse-dot {
            width: 12px;
            height: 12px;
            background-color: #1eff6e;
            border-radius: 50%;
            box-shadow: 0 0 6px #1eff6e;
            animation: pulse 1.5s infinite ease-out;
        }

        /* Messages container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Glassmorphism Chat Bubbles with slide-up animation */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: slideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            opacity: 0;
            transform-origin: bottom;
        }

        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(18px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message-bubble {
            background: rgba(25, 20, 50, 0.65);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 0.8rem 1.2rem;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: 0.1s;
        }

        .message-sender {
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            color: #0ff;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: inline-block;
            text-shadow: 0 0 2px #0ff;
        }

        .message-text {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #f0f3ff;
            word-wrap: break-word;
        }

        .message-time {
            font-size: 0.65rem;
            color: #aaaaff;
            margin-top: 5px;
            text-align: right;
            opacity: 0.7;
        }

        /* Own message alignment (client side visual) */
        .message.own {
            align-self: flex-end;
        }

        .message.own .message-bubble {
            background: rgba(0, 180, 200, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.5);
        }

        /* Typing Indicator */
        .typing-indicator {
            background: rgba(12, 10, 29, 0.7);
            backdrop-filter: blur(20px);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.75rem;
            width: fit-content;
            margin-top: 0.2rem;
            margin-bottom: 0.5rem;
            color: #8bb9ff;
            border-left: 2px solid cyan;
        }

        /* Input area with glowing neon border */
        .input-area {
            background: rgba(5, 3, 15, 0.7);
            backdrop-filter: blur(18px);
            padding: 1rem 1.8rem;
            border-top: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .neon-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid transparent;
            border-radius: 48px;
            padding: 0.9rem 1.2rem;
            font-family: 'Inter', monospace;
            font-size: 0.95rem;
            color: #fff;
            outline: none;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 6px rgba(0, 255, 255, 0.3);
        }

        /* Glowing neon border effect */
        .neon-input:focus {
            border: 2px solid #0ff;
            box-shadow: 0 0 12px #0ff, 0 0 24px rgba(0, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.7);
        }

        button {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            padding: 0.7rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: #0ff;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(8px);
            font-size: 0.8rem;
        }

        button:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.6);
            color: white;
            border-color: #fff;
        }

        .clear-btn {
            background: rgba(255, 40, 80, 0.15);
            border-color: #ff3366;
            color: #ff88aa;
        }

        .clear-btn:hover {
            background: rgba(255, 40, 80, 0.4);
            box-shadow: 0 0 10px #ff3366;
            color: white;
        }

        /* Mobile Responsive: full screen, sidebar becomes bottom drawer? Actually design: on mobile sidebar hidden and we show users in a top row? Better: hide sidebar, make chat full width */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .chat-header {
                padding: 0.8rem 1rem;
            }
            .messages-container {
                padding: 1rem;
            }
            .input-area {
                padding: 0.8rem 1rem;
            }
            .message {
                max-width: 90%;
            }
            .callsign-badge {
                font-size: 0.7rem;
            }
        }

        /* Custom scrollbar */
        .messages-container::-webkit-scrollbar, .users-list::-webkit-scrollbar {
            width: 4px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: #0a0a1a;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: cyan;
            border-radius: 10px;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(30, 255, 110, 0.7);
            }
            70% {
                transform: scale(1.1);
                box-shadow: 0 0 0 8px rgba(30, 255, 110, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(30, 255, 110, 0);
            }
        }

        @keyframes pulse-green {
            0% { opacity: 0.5; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="neon-dot"></div>
            <span>✦ ACTIVE SPECTRES ✦</span>
        </div>
        <div class="users-list" id="usersList">
            <div class="user-item"><span>⟡</span> Synth_Reaper</div>
            <div class="user-item"><span>⟡</span> Neon_Knight</div>
        </div>
    </aside>
    <main class="chat-main">
        <div class="chat-header">
            <div class="callsign-badge" id="myCallsignDisplay">⚡ CONNECTING...</div>
            <div class="online-indicator">
                <div class="pulse-dot"></div>
                <span>NEXUS LIVE</span>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="typing-indicator" id="typingIndicator" style="display: none;">✧ someone is crafting a message...</div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" class="neon-input" placeholder="encrypt your message... [enter to send]" autocomplete="off">
            </div>
            <button id="sendBtn">➤ SEND</button>
            <button id="clearChatBtn" class="clear-btn">🗲 CLEAR</button>
        </div>
    </main>
</div>

<script>
    // connect to socket.io
    const socket = io();

    // DOM elements
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const myCallsignSpan = document.getElementById('myCallsignDisplay');
    const usersListDiv = document.getElementById('usersList');
    const typingIndicatorDiv = document.getElementById('typingIndicator');

    let myCallsign = "GHOST_???";
    let currentUsers = [];      // store for sidebar update

    // Helper: generate futuristic callsign (cool names)
    function generateCallsign() {
        const prefixes = ["Neon", "Cyber", "Void", "Rogue", "Phantom", "Echo", "Shadow", "Nova", "Cipher", "Glitch", "Synth", "Rift"];
        const suffixes = ["Wraith", "Ghost", "Spectre", "Reaper", "Havoc", "Knight", "Raven", "Stalker", "Phantom", "Drift", "Vector", "Flux"];
        const pre = prefixes[Math.floor(Math.random() * prefixes.length)];
        const suf = suffixes[Math.floor(Math.random() * suffixes.length)];
        const num = Math.floor(Math.random() * 99);
        return `${pre}_${suf}${num}`;
    }

    // Assign random callsign on init (server will confirm)
    const tempCallsign = generateCallsign();
    socket.emit('set-callsign', tempCallsign);

    // Handle incoming identity confirmation
    socket.on('identity', (data) => {
        myCallsign = data.callsign;
        myCallsignSpan.innerHTML = `⚡ ${myCallsign}`;
    });

    // Load chat history (in-memory from server)
    socket.on('chat history', (messages) => {
        messagesContainer.innerHTML = ''; // clear dummy, but keep typing indicator first
        // re-append typing indicator at bottom? We'll just clear and re-add typing indicator separately.
        // Better: preserve typing indicator div as separate element outside of messages?
        // Current html: typingIndicator is inside messagesContainer? Actually it's inside messagesContainer but as first element.
        // We'll clear messagesContainer then add typing indicator again.
        const typingElem = typingIndicatorDiv;
        messagesContainer.innerHTML = '';
        messagesContainer.appendChild(typingElem);
        messages.forEach(msg => {
            appendMessageToDOM(msg.callsign, msg.text, msg.timestamp, msg.callsign === myCallsign);
        });
        scrollToBottom();
    });

    // New message broadcast
    socket.on('new message', (msg) => {
        const isOwn = (msg.callsign === myCallsign);
        appendMessageToDOM(msg.callsign, msg.text, msg.timestamp, isOwn);
        scrollToBottom();
    });

    // Update online users list
    socket.on('update users', (usersArray) => {
        currentUsers = usersArray;
        renderUsersList(usersArray);
    });

    // Typing indicator handling
    let typingTimeout;
    socket.on('user typing', (data) => {
        if (data.callsign !== myCallsign) {
            typingIndicatorDiv.style.display = 'block';
            typingIndicatorDiv.innerHTML = `✧ ${data.callsign} is typing...`;
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                if (typingIndicatorDiv.style.display === 'block') {
                    typingIndicatorDiv.style.display = 'none';
                }
            }, 1200);
        }
    });

    // Debounced typing emit
    let lastTypingTime = 0;
    messageInput.addEventListener('input', () => {
        const now = Date.now();
        if (now - lastTypingTime > 400) {
            lastTypingTime = now;
            socket.emit('typing', { callsign: myCallsign });
        }
    });

    // Send message function
    function sendMessage() {
        const text = messageInput.value.trim();
        if (text === "") return;
        socket.emit('chat message', { text: text, callsign: myCallsign });
        messageInput.value = "";
        messageInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Clear chat locally (clear DOM messages, also emit to server for clearing memory? But requirement: 'Clear Chat' button works locally.
    // However we want to clear messages from memory on server? requirement: "Clear Chat button that works locally."
    // Means it should clear the UI messages for the current client, without affecting other users' chat history.
    // Also server keeps messages in memory but we won't delete from server. So local only.
    clearChatBtn.addEventListener('click', () => {
        // Remove all message nodes but keep the typing indicator inside messagesContainer
        const children = messagesContainer.children;
        for (let i = children.length - 1; i >= 0; i--) {
            if (children[i] !== typingIndicatorDiv) {
                children[i].remove();
            }
        }
        // Also optional: show a system flash
        const sysMsgDiv = document.createElement('div');
        sysMsgDiv.className = 'message';
        sysMsgDiv.style.animation = 'slideUp 0.2s forwards';
        sysMsgDiv.style.opacity = '0';
        sysMsgDiv.innerHTML = `<div class="message-bubble" style="background:rgba(255,50,100,0.2);"><div class="message-sender" style="color:#ff88aa;">⚠️ SYSTEM</div><div class="message-text">Local chat cleared. Nexus still active.</div></div>`;
        messagesContainer.insertBefore(sysMsgDiv, typingIndicatorDiv);
        setTimeout(() => {
            if(sysMsgDiv && sysMsgDiv.remove) sysMsgDiv.remove();
        }, 1800);
        scrollToBottom();
    });

    // Append message to DOM
    function appendMessageToDOM(sender, text, timestamp, isOwn = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isOwn ? 'own' : ''}`;
        // format time nicely
        const timeStr = timestamp ? new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        messageDiv.innerHTML = `
            <div class="message-bubble">
                <div class="message-sender">${escapeHtml(sender)}</div>
                <div class="message-text">${escapeHtml(text)}</div>
                <div class="message-time">${timeStr}</div>
            </div>
        `;
        // Insert before typing indicator (always keep typing at bottom)
        messagesContainer.insertBefore(messageDiv, typingIndicatorDiv);
        scrollToBottom();
    }

    // Render sidebar users list
    function renderUsersList(users) {
        if (!usersListDiv) return;
        if (!users || users.length === 0) {
            usersListDiv.innerHTML = '<div class="user-item"><span>⟡</span> alone in the void</div>';
            return;
        }
        usersListDiv.innerHTML = '';
        users.forEach(user => {
            const userEl = document.createElement('div');
            userEl.className = 'user-item';
            userEl.innerHTML = `<span>✦</span> ${escapeHtml(user)}`;
            usersListDiv.appendChild(userEl);
        });
    }

    function scrollToBottom() {
        setTimeout(() => {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 50);
    }

    // simple escape
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // Cleanup typing indicator when focus lost
    messageInput.addEventListener('blur', () => {
        // optional
    });
</script>
</body>
</html>
